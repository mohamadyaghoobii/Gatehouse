name: leaky-build
on:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      API_KEY: 1a2b3c4d5e6f7g8h9i0jklmnopqrstuv
      DB_PASSWORD: prod-database-password-123
    steps:
      - uses: actions/checkout@v4
      - name: Print config
        run: echo "Using token ${{ secrets.DEPLOY_TOKEN }}"
      - name: Build image
        run: docker build --build-arg NPM_TOKEN=$NPM_TOKEN -t app .
      - name: Save env
        run: cp .env dist/.env
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/.env
