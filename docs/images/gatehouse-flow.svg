<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 220" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#070a11"/>
    </linearGradient>
    <linearGradient id="fa" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6ea8fe"/>
      <stop offset="1" stop-color="#8b7bff"/>
    </linearGradient>
    <marker id="far" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0,0 L8,5 L0,10 Z" fill="#42557d"/>
    </marker>
    <style>
      .step{fill:#131a2a;stroke:rgba(148,170,210,.18);}
      .n{fill:#6ea8fe;font-size:12px;font-weight:700;}
      .t{fill:#eef2f9;font-size:14px;font-weight:600;}
      .s{fill:#8a99b8;font-size:11px;}
      .arrow{stroke:#42557d;stroke-width:2;fill:none;marker-end:url(#far);}
    </style>
  </defs>
  <rect width="980" height="220" fill="url(#fbg)"/>
  <rect x="26" y="22" width="6" height="30" rx="3" fill="url(#fa)"/>
  <text x="44" y="44" fill="#eef2f9" font-size="16" font-weight="700">How an analysis runs</text>

  <g>
    <rect class="step" x="26" y="80" width="200" height="104" rx="14"/>
    <text x="46" y="108" class="n">01</text>
    <text x="46" y="132" class="t">Detect &amp; parse</text>
    <text x="46" y="152" class="s">Identify the provider and</text>
    <text x="46" y="168" class="s">build a normalized model.</text>
  </g>
  <path class="arrow" d="M232 132 H262"/>

  <g>
    <rect class="step" x="268" y="80" width="200" height="104" rx="14"/>
    <text x="288" y="108" class="n">02</text>
    <text x="288" y="132" class="t">Run rule engine</text>
    <text x="288" y="152" class="s">37 checks across 9 risk</text>
    <text x="288" y="168" class="s">categories, with line refs.</text>
  </g>
  <path class="arrow" d="M474 132 H504"/>

  <g>
    <rect class="step" x="510" y="80" width="200" height="104" rx="14"/>
    <text x="530" y="108" class="n">03</text>
    <text x="530" y="132" class="t">Score &amp; grade</text>
    <text x="530" y="152" class="s">Weight by severity and</text>
    <text x="530" y="168" class="s">confidence from 100.</text>
  </g>
  <path class="arrow" d="M716 132 H746"/>

  <g>
    <rect class="step" x="752" y="80" width="202" height="104" rx="14"/>
    <text x="772" y="108" class="n">04</text>
    <text x="772" y="132" class="t">Report</text>
    <text x="772" y="152" class="s">Findings, remediation, and</text>
    <text x="772" y="168" class="s">a stable JSON contract.</text>
  </g>
</svg>
