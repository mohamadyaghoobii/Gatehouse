<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1c"/>
      <stop offset="1" stop-color="#070a11"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ea8fe"/>
      <stop offset="1" stop-color="#8b7bff"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5d73"/>
      <stop offset="1" stop-color="#ff9f45"/>
    </linearGradient>
    <style>
      .card{fill:#131a2a;stroke:rgba(148,170,210,.14);}
      .panel{fill:#0e1320;stroke:rgba(148,170,210,.12);}
      .t{fill:#eef2f9;}.m{fill:#93a1bd;}.f{fill:#61708d;}
      .mono{font-family:"JetBrains Mono",monospace;}
    </style>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="180" cy="0" r="360" fill="#6ea8fe" opacity="0.06"/>
  <circle cx="1100" cy="60" r="320" fill="#8b7bff" opacity="0.06"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="232" height="720" fill="#0b1020" stroke="rgba(148,170,210,.12)"/>
  <rect x="22" y="26" width="34" height="34" rx="10" fill="url(#accent)"/>
  <path d="M32 36 l4 -1.5 4 1.5 v5 c0 3 -4 5 -4 5 s-4 -2 -4 -5 z" fill="#0b1020"/>
  <text x="68" y="42" class="t" font-size="15" font-weight="700">Gatehouse</text>
  <text x="68" y="58" class="f" font-size="10" letter-spacing="1">PIPELINE REVIEW</text>

  <rect x="18" y="96" width="196" height="38" rx="9" fill="rgba(110,168,254,.14)" stroke="rgba(110,168,254,.25)"/>
  <text x="40" y="120" class="t" font-size="13" font-weight="600">Analyze</text>
  <text x="40" y="166" class="m" font-size="13">Rules</text>
  <text x="40" y="200" class="m" font-size="13">Examples</text>
  <text x="40" y="234" class="m" font-size="13">Docs</text>
  <rect x="18" y="586" width="196" height="104" rx="12" class="card"/>
  <text x="34" y="612" fill="#6ea8fe" font-size="9" letter-spacing="1">OPSDECK READY</text>
  <text x="34" y="632" class="t" font-size="12" font-weight="600">Stable JSON contract</text>
  <text x="34" y="654" class="f" font-size="10">Exports a versioned schema</text>
  <text x="34" y="668" class="f" font-size="10">for the OpsDeck platform.</text>

  <!-- Topbar -->
  <text x="266" y="50" fill="#6ea8fe" font-size="10" letter-spacing="1.5">CI/CD SECURITY REVIEW</text>
  <text x="266" y="78" class="t" font-size="24" font-weight="700">Analyze pipeline</text>
  <rect x="900" y="40" width="130" height="38" rx="10" class="panel"/>
  <text x="918" y="64" class="m" font-size="12">Auto detect ▾</text>
  <rect x="1042" y="40" width="134" height="38" rx="10" fill="url(#accent)"/>
  <text x="1060" y="64" fill="#060a14" font-size="12" font-weight="700">Analyze pipeline</text>

  <!-- Editor -->
  <rect x="266" y="104" width="540" height="372" rx="16" class="panel"/>
  <rect x="266" y="104" width="540" height="44" rx="16" fill="#10182a"/>
  <rect x="284" y="118" width="120" height="20" rx="10" fill="rgba(110,168,254,.12)"/>
  <circle cx="298" cy="128" r="4" fill="#6ea8fe"/>
  <text x="312" y="132" class="m" font-size="11">GitHub Actions</text>
  <text x="690" y="132" class="f" font-size="11">Load sample ▾</text>
  <g class="mono" font-size="11.5">
    <text x="290" y="178" class="f">1</text><text x="320" y="178" fill="#cfe0ff">name: risky-release</text>
    <text x="290" y="200" class="f">2</text><text x="320" y="200" fill="#cfe0ff">on:</text>
    <text x="290" y="222" class="f">3</text><text x="320" y="222" fill="#cfe0ff">  push: { branches: [main] }</text>
    <text x="290" y="244" class="f">4</text><text x="320" y="244" fill="#ff9f45">permissions: write-all</text>
    <text x="290" y="266" class="f">5</text><text x="320" y="266" fill="#cfe0ff">jobs:</text>
    <text x="290" y="288" class="f">6</text><text x="320" y="288" fill="#cfe0ff">  deploy:</text>
    <text x="290" y="310" class="f">7</text><text x="320" y="310" fill="#cfe0ff">    runs-on: ubuntu-latest</text>
    <text x="290" y="332" class="f">8</text><text x="320" y="332" fill="#cfe0ff">    steps:</text>
    <text x="290" y="354" class="f">9</text><text x="320" y="354" fill="#ff5d73">      - uses: actions/checkout@v3</text>
    <text x="290" y="376" class="f">10</text><text x="320" y="376" fill="#cfe0ff">      - run: curl ... | bash</text>
    <text x="290" y="398" class="f">11</text><text x="320" y="398" fill="#cfe0ff">      - run: kubectl apply -f k8s/</text>
  </g>
  <line x1="266" y1="440" x2="806" y2="440" stroke="rgba(148,170,210,.12)"/>
  <text x="286" y="462" class="f" font-size="11">11 lines · 248 chars</text>

  <!-- Score card -->
  <rect x="826" y="104" width="350" height="142" rx="16" class="card"/>
  <circle cx="894" cy="175" r="44" fill="none" stroke="rgba(148,170,210,.12)" stroke-width="9"/>
  <circle cx="894" cy="175" r="44" fill="none" stroke="url(#ring)" stroke-width="9" stroke-linecap="round"
          stroke-dasharray="42 234" transform="rotate(-90 894 175)"/>
  <text x="894" y="180" class="t" font-size="26" font-weight="700" text-anchor="middle">14</text>
  <text x="894" y="196" class="f" font-size="9" text-anchor="middle">of 100</text>
  <rect x="962" y="128" width="34" height="28" rx="8" fill="#ff5d73"/>
  <text x="979" y="147" fill="#1a0608" font-size="14" font-weight="700" text-anchor="middle">F</text>
  <text x="962" y="178" class="m" font-size="11">Reviewed 1 job and found 9</text>
  <text x="962" y="194" class="m" font-size="11">issues, including 3 critical/high.</text>
  <text x="962" y="222" class="f" font-size="10">Started at 100, −86 for severity.</text>

  <!-- Severity breakdown -->
  <rect x="826" y="262" width="350" height="120" rx="16" class="card"/>
  <text x="846" y="290" class="t" font-size="13" font-weight="600">Severity breakdown</text>
  <text x="1140" y="290" class="f" font-size="11" text-anchor="end">9 findings</text>
  <rect x="846" y="304" width="310" height="9" rx="5" fill="rgba(148,170,210,.1)"/>
  <rect x="846" y="304" width="42" height="9" rx="5" fill="#ff5d73"/>
  <rect x="890" y="304" width="84" height="9" fill="#ff9f45"/>
  <rect x="976" y="304" width="120" height="9" fill="#ffd24a"/>
  <rect x="1098" y="304" width="58" height="9" rx="5" fill="#79b8ff"/>
  <g font-size="11">
    <circle cx="852" cy="340" r="4" fill="#ff5d73"/><text x="862" y="344" class="m">Critical 1</text>
    <circle cx="942" cy="340" r="4" fill="#ff9f45"/><text x="952" y="344" class="m">High 2</text>
    <circle cx="1022" cy="340" r="4" fill="#ffd24a"/><text x="1032" y="344" class="m">Medium 4</text>
    <circle cx="1112" cy="340" r="4" fill="#79b8ff"/><text x="1122" y="344" class="m">Info 2</text>
  </g>
  <g font-size="11">
    <circle cx="852" cy="364" r="4" fill="#4ce0a0"/><text x="862" y="368" class="m">Low 0</text>
  </g>

  <!-- Findings section -->
  <text x="266" y="512" class="t" font-size="17" font-weight="700">Findings</text>
  <rect x="700" y="496" width="56" height="24" rx="12" fill="#182032" stroke="rgba(148,170,210,.18)"/>
  <text x="728" y="512" class="m" font-size="11" text-anchor="middle">All 9</text>
  <rect x="762" y="496" width="80" height="24" rx="12" fill="#182032"/>
  <text x="802" y="512" fill="#ff5d73" font-size="11" text-anchor="middle">Critical 1</text>

  <!-- finding 1 -->
  <rect x="266" y="534" width="910" height="82" rx="11" fill="#0e1320" stroke="rgba(148,170,210,.14)"/>
  <rect x="266" y="534" width="3" height="82" fill="#ff5d73"/>
  <rect x="286" y="552" width="56" height="22" rx="7" fill="rgba(255,93,115,.14)"/>
  <text x="314" y="567" fill="#ff5d73" font-size="10" font-weight="700" text-anchor="middle">CRITICAL</text>
  <text x="360" y="566" class="t" font-size="14" font-weight="600">Hardcoded secret assigned to DEPLOY_TOKEN</text>
  <text x="360" y="588" class="f" font-size="11.5">Secrets · </text>
  <text x="414" y="588" class="m mono" font-size="11">SECRET-HARDCODED-VALUE</text>
  <text x="560" y="588" class="f" font-size="11.5">· line 7 · 80% confidence</text>

  <!-- finding 2 -->
  <rect x="266" y="626" width="910" height="70" rx="11" fill="#0e1320" stroke="rgba(148,170,210,.14)"/>
  <rect x="266" y="626" width="3" height="70" fill="#ff9f45"/>
  <rect x="286" y="644" width="40" height="22" rx="7" fill="rgba(255,159,69,.14)"/>
  <text x="306" y="659" fill="#ff9f45" font-size="10" font-weight="700" text-anchor="middle">HIGH</text>
  <text x="344" y="658" class="t" font-size="14" font-weight="600">Remote script piped directly into a shell</text>
  <text x="344" y="680" class="f" font-size="11.5">Supply Chain · </text>
  <text x="430" y="680" class="m mono" font-size="11">SC-REMOTE-EXEC</text>
  <text x="546" y="680" class="f" font-size="11.5">· line 10</text>
</svg>
