services:
  api:
    build:
      context: ./apps/api
    environment:
      GATEHOUSE_API_HOST: 0.0.0.0
      GATEHOUSE_API_PORT: 8000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      AI_PROVIDER: none
    ports:
      - "8000:8000"
    volumes:
      - ./examples:/app/examples:ro
  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
